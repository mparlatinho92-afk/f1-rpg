<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="referrer" content="no-referrer">
<title>F1 Team Logo Builder</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: monospace; background: #0f172a; color: #e2e8f0; padding: 16px; }
  h1 { color: #FFD700; font-size: 15px; margin-bottom: 4px; }
  .sub { color: #64748b; font-size: 11px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; flex-wrap: wrap; }
  input[type=text], input[type=number] {
    background: #1e293b; border: 1px solid #334155; color: #e2e8f0;
    padding: 6px 10px; border-radius: 6px; font-family: monospace; font-size: 12px; }
  button { padding: 6px 12px; border: none; border-radius: 6px; cursor: pointer;
    font-size: 12px; font-family: monospace; white-space: nowrap; }
  .btn-blue  { background: #2563eb; color: #fff; }
  .btn-green { background: #16a34a; color: #fff; }
  .btn-gray  { background: #334155; color: #94a3b8; }
  .btn-red   { background: #dc2626; color: #fff; }
  .btn-sm    { padding: 3px 8px; font-size: 10px; }
  button:hover { opacity: 0.85; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  #status { font-size: 12px; color: #94a3b8; padding: 4px 0; min-height: 18px; }
  #status.err { color: #f87171; }
  #status.ok  { color: #4ade80; }
  #status.warn { color: #f59e0b; }

  #search-results { background: #1e293b; border: 1px solid #334155; border-radius: 6px;
    margin-bottom: 8px; display: none; max-height: 180px; overflow-y: auto; }
  .search-hit { padding: 6px 10px; cursor: pointer; font-size: 11px; border-bottom: 1px solid #0f172a; }
  .search-hit:hover { background: #2d3f55; }
  .search-hit .page { color: #93c5fd; }
  .search-hit .snippet { color: #64748b; font-size: 10px; }

  #team-queue { background: #1e293b; border: 1px solid #1e3a5f; border-radius: 8px;
    padding: 10px; margin-bottom: 12px; }
  #team-queue h2 { color: #94a3b8; font-size: 11px; margin-bottom: 6px; }
  .team-chip { display: inline-block; margin: 2px; padding: 3px 8px; border-radius: 4px;
    font-size: 11px; cursor: pointer; background: #0f172a; border: 1px solid #334155; color: #94a3b8; }
  .team-chip:hover { border-color: #2563eb; color: #93c5fd; }
  .team-chip.done { background: #14532d; border-color: #166534; color: #4ade80; }
  .team-chip.err  { background: #450a0a; border-color: #7f1d1d; color: #fca5a5; }

  /* Filter bar */
  #filter-bar { display:none; background:#1e293b; border:1px solid #334155; border-radius:6px;
    padding:8px 12px; margin-bottom:8px; font-size:11px; }
  #filter-bar label { color:#94a3b8; margin-right:8px; }
  #filter-kw { background:#0f172a; border:1px solid #334155; color:#e2e8f0;
    padding:3px 8px; border-radius:4px; font-size:11px; width:200px; }
  #filter-count { color:#64748b; margin-left:8px; }

  #gallery {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
    gap: 10px; margin-top: 10px;
    max-height: 55vh; overflow-y: auto; padding-right: 4px;
  }
  .logo-card { background: #1e293b; border: 2px solid #334155; border-radius: 8px;
    padding: 8px; cursor: pointer; transition: border-color 0.15s; }
  .logo-card:hover { border-color: #475569; }
  .logo-card.selected { border-color: #2563eb; background: #1e3a5f; }
  .logo-card.filtered-out { display: none; }
  .logo-img-wrap { width: 100%; height: 72px; background: #0f172a; border-radius: 4px;
    display: flex; align-items: center; justify-content: center; overflow: hidden; margin-bottom: 6px; }
  .logo-img-wrap img { max-width: 100%; max-height: 70px; object-fit: contain; display: block; }
  .logo-img-wrap .img-err { color: #475569; font-size: 10px; text-align: center; padding: 4px; }
  .logo-caption { font-size: 10px; color: #94a3b8; text-align: center;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .logo-caption.years-cap { color: #3b82f6; margin-top: 2px; }
  .logo-years { display: flex; gap: 4px; margin-top: 6px; align-items: center; }
  .logo-years input { width: 55px; padding: 3px 5px; font-size: 11px; text-align: center; border-radius: 4px; }
  .logo-years span { color: #64748b; font-size: 11px; }
  .use-btn { width: 100%; margin-top: 6px; padding: 4px; border-radius: 4px; font-size: 10px;
    border: 1px solid #334155; background: #0f172a; color: #64748b; cursor: pointer; }
  .use-btn.active { background: #1d4ed8; border-color: #2563eb; color: #fff; }

  .out-box { background: #0a0f1e; border: 1px solid #1e3a5f; border-radius: 6px;
    padding: 10px; font-size: 11px; color: #4ade80; white-space: pre; overflow-x: auto;
    max-height: 280px; overflow-y: auto; margin-top: 6px; }
  hr { border: none; border-top: 1px solid #1e293b; margin: 14px 0; }
  h2.sec { color: #FFD700; font-size: 13px; }
</style>
</head>
<body>
<h1>🏎️ F1 Team Logo Builder — Logopedia</h1>
<p class="sub">Logopedia-Seite laden → Logos filtern → auswählen → Zeiträume setzen → Code generieren</p>

<div id="team-queue">
  <h2>Bekannte Teams (klicken zum Laden):</h2>
  <div id="chips"></div>
</div>

<div class="row">
  <input type="text" id="search-input" placeholder="Logopedia suchen oder Seitenname eingeben" style="flex:1;min-width:160px"
         oninput="searchDebounce()" onkeydown="if(event.key==='Enter'){document.getElementById('search-results').style.display='none';fetchPage();}">
  <input type="text" id="teamid-input" placeholder="teamId z.B. ferrari" style="width:130px">
  <button class="btn-blue" id="load-btn" onclick="fetchPage()">🔍 Laden</button>
</div>
<div id="search-results"></div>
<div id="status">Bereit.</div>

<!-- Filter -->
<div id="filter-bar">
  <label>Filter Dateinamen:</label>
  <input type="text" id="filter-kw" placeholder="z.B. haas ferrari" oninput="applyFilter()">
  <button class="btn-sm btn-gray" onclick="document.getElementById('filter-kw').value='';applyFilter()">✕ Reset</button>
  <span id="filter-count"></span>
  <span style="color:#64748b;margin-left:12px;font-size:10px">Mehrere Begriffe mit Leerzeichen trennen (OR)</span>
</div>

<div id="gallery"></div>

<div id="output-wrap" style="display:none;margin-top:12px">
  <hr>
  <div class="row">
    <h2 class="sec" style="flex:1">📋 Generierter Code</h2>
    <button class="btn-sm btn-green" onclick="copyOutput()">Kopieren</button>
    <button class="btn-sm btn-gray"  onclick="addToAll()">+ Gesamtliste</button>
  </div>
  <div class="out-box" id="output"></div>
</div>

<div id="all-wrap" style="display:none;margin-top:12px">
  <hr>
  <div class="row">
    <h2 class="sec" style="flex:1">🗂️ Gesamtliste</h2>
    <button class="btn-sm btn-green" onclick="copyAll()">Alles kopieren</button>
    <button class="btn-sm btn-red"   onclick="clearAll()">Löschen</button>
  </div>
  <div class="out-box" id="all-output"></div>
</div>

<script>
// Corrected Logopedia page names (verified or best-guess)
const KNOWN_TEAMS = [
  { page: 'McLaren_F1_Team',                         id: 'mclaren',      keywords: ['mclaren','marlboro','ron dennis'] },
  { page: 'Scuderia_Ferrari',                         id: 'ferrari',      keywords: ['ferrari','scuderia'] },
  { page: 'Williams_Racing',                          id: 'williams',     keywords: ['williams'], altPages: ['Williams_Grand_Prix_Engineering','Williams_F1_Team','Williams'] },
  { page: 'Mercedes-AMG_Petronas_Formula_One_Team',   id: 'mercedes',     keywords: ['mercedes','amg','petronas','brawn'] },
  { page: 'Red_Bull_Racing',                          id: 'red-bull',     keywords: ['red bull','redbull','rbr'] },
  { page: 'Team_Lotus',                               id: 'lotus',        keywords: ['lotus','jps','gold leaf'], altPages: ['Lotus_F1_Team','Team_Lotus_F1','Lotus'] },
  { page: 'Brabham',                                  id: 'brabham',      keywords: ['brabham'], altPages: ['Brabham_Racing','Motor_Racing_Developments'] },
  { page: 'Tyrrell',                                  id: 'tyrrell',      keywords: ['tyrrell'], altPages: ['Tyrrell_Racing','Tyrrell_F1'] },
  { page: 'British_Racing_Motors',                    id: 'brm',          keywords: ['brm','british racing'], altPages: ['BRM','BRM_F1'] },
  { page: 'Cooper_Car_Company',                       id: 'cooper',       keywords: ['cooper'], altPages: ['Cooper_Racing','Cooper_F1','Cooper'] },
  { page: 'Alfa_Romeo_F1_Team_Orlen',                 id: 'alfa-romeo',   keywords: ['alfa','sauber','orlen'], altPages: ['Alfa_Romeo_Racing','Sauber_Motorsport','Alfa_Romeo_F1'] },
  { page: 'Aston_Martin_Aramco_Cognizant_Formula_One_Team', id: 'aston-martin', keywords: ['aston','racing point','force india','jordan'], altPages: ['Aston_Martin_F1_Team','Aston_Martin'] },
  { page: 'Alpine_F1_Team',                           id: 'alpine',       keywords: ['alpine','renault','enstone'] },
  { page: 'Haas_F1_Team',                             id: 'haas',         keywords: ['haas'] },
  { page: 'Scuderia_AlphaTauri',                      id: 'alphatauri',   keywords: ['alphatauri','toro rosso'], altPages: ['AlphaTauri','Scuderia_Toro_Rosso'] },
  { page: 'Kick_Sauber',                              id: 'sauber',       keywords: ['sauber','kick','stake'], altPages: ['Stake_F1_Team_Kick_Sauber','Sauber_F1_Team','Sauber'] },
  { page: 'Sahara_Force_India_F1_Team',               id: 'force-india',  keywords: ['force india','sahara'], altPages: ['Force_India_F1_Team','Force_India'] },
  { page: 'Jordan_Grand_Prix',                        id: 'jordan',       keywords: ['jordan'] },
  { page: 'Benetton_Formula',                         id: 'benetton',     keywords: ['benetton','camel','mild seven'] },
  { page: 'Ligier',                                   id: 'ligier',       keywords: ['ligier'] },
  { page: 'Minardi',                                  id: 'minardi',      keywords: ['minardi'] },
  { page: 'British_American_Racing',                  id: 'bar',          keywords: ['bar','british american','lucky strike'] },
  { page: 'Panasonic_Toyota_Racing',                  id: 'toyota',       keywords: ['toyota','panasonic'], altPages: ['Toyota_F1_Team','Toyota_Racing'] },
  { page: 'Honda_Racing_F1_Team',                     id: 'honda-team',   keywords: ['honda'], altPages: ['Honda_F1_Team','Honda_F1','Honda_Racing_F1'] },
  { page: 'Kojima_Engineering',                       id: 'kojima',       keywords: ['kojima'] },
  { page: 'Renault_F1_Team',                          id: 'renault',      keywords: ['renault','elf'], altPages: ['Renault_F1','Renault','Renault_in_Formula_One'] },
];

// Generic images to always exclude (appear on many Logopedia pages as templates)
const GENERIC_EXCLUDE = [
  'formula one','formula_one','f1_logo','fia_','logopedia_info',
  'svg_needed','svg needed','infowhite','infobox'
];

let allEntries = {};
let searchTimer = null;
let currentKeywords = [];

const chipsDiv = document.getElementById('chips');
KNOWN_TEAMS.forEach(t => {
  const chip = document.createElement('span');
  chip.className = 'team-chip';
  chip.id = 'chip-' + t.id;
  chip.textContent = t.id;
  chip.title = t.page;
  chip.onclick = () => {
    document.getElementById('search-input').value = t.page;
    document.getElementById('teamid-input').value = t.id;
    document.getElementById('search-results').style.display = 'none';
    currentKeywords = t.keywords || [];
    window._triedAlts = {};
    fetchPage();
  };
  chipsDiv.appendChild(chip);
});

function searchDebounce() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(doSearch, 400);
}

async function doSearch() {
  const q = document.getElementById('search-input').value.trim();
  if (q.length < 3) { document.getElementById('search-results').style.display='none'; return; }
  // Don't search if it looks like a page name already
  if (q.includes('_')) return;
  try {
    const url = `https://logos.fandom.com/api.php?action=query&list=search&srsearch=${encodeURIComponent(q)}&srlimit=8&format=json&origin=*`;
    const res = await fetch(url);
    const data = await res.json();
    const hits = data.query?.search || [];
    const box = document.getElementById('search-results');
    if (!hits.length) { box.style.display='none'; return; }
    box.innerHTML = hits.map(h => `
      <div class="search-hit" onclick="selectResult('${h.title.replace(/'/g,"\\'")}')">
        <span class="page">${h.title}</span>
        <div class="snippet">${h.snippet.replace(/<[^>]+>/g,'').substring(0,90)}…</div>
      </div>`).join('');
    box.style.display = 'block';
  } catch(e) {}
}

function selectResult(title) {
  document.getElementById('search-input').value = title;
  document.getElementById('search-results').style.display = 'none';
  if (!document.getElementById('teamid-input').value) {
    document.getElementById('teamid-input').value =
      title.toLowerCase().replace(/[_\s]+/g,'-').replace(/[^a-z0-9-]/g,'').substring(0,20);
  }
}

function isGenericImage(name) {
  const lower = name.toLowerCase();
  return GENERIC_EXCLUDE.some(ex => lower.includes(ex));
}

async function fetchPage() {
  const page = document.getElementById('search-input').value.trim();
  const teamId = document.getElementById('teamid-input').value.trim();
  if (!page || !teamId) { alert('Seitenname und teamId eingeben'); return; }

  const status = document.getElementById('status');
  const gallery = document.getElementById('gallery');
  gallery.innerHTML = '';
  document.getElementById('output-wrap').style.display = 'none';
  document.getElementById('search-results').style.display = 'none';
  document.getElementById('filter-bar').style.display = 'none';
  status.className = '';
  status.textContent = `⏳ Lade "${page}"…`;

  const btn = document.getElementById('load-btn');
  btn.disabled = true;

  try {
    const apiBase = 'https://logos.fandom.com/api.php';

    // Step 1: images list
    const r1 = await fetch(`${apiBase}?action=parse&page=${encodeURIComponent(page)}&prop=images&format=json&origin=*`);
    const d1 = await r1.json();
    if (d1.error) throw new Error(d1.error.info);

    const allImages = (d1.parse?.images || []).filter(i => /\.(png|jpg|jpeg|svg|gif|webp)$/i.test(i));
    if (!allImages.length) throw new Error('Keine Bilder auf dieser Seite');

    // Filter out obvious generic/unrelated images
    const images = allImages.filter(i => !isGenericImage(i));
    const filtered = allImages.length - images.length;

    status.textContent = `⏳ ${images.length} Bilder (${filtered} generische gefiltert), lade URLs…`;

    // Step 2: URLs in chunks
    let urlMap = {};
    for (let i = 0; i < images.length; i += 50) {
      const chunk = images.slice(i, i + 50);
      const titles = chunk.map(f => 'File:' + f).join('|');
      const r2 = await fetch(`${apiBase}?action=query&titles=${encodeURIComponent(titles)}&prop=imageinfo&iiprop=url&format=json&origin=*`);
      const d2 = await r2.json();
      Object.values(d2.query?.pages || {}).forEach(p => {
        const u = p.imageinfo?.[0]?.url;
        if (u) {
          const key = (p.title || '').replace('File:', '');
          urlMap[key] = u;
          try { urlMap[decodeURIComponent(key)] = u; } catch(e) {}
        }
      });
    }

    // Step 3: wikitext captions
    const r3 = await fetch(`${apiBase}?action=parse&page=${encodeURIComponent(page)}&prop=wikitext&format=json&origin=*`);
    const d3 = await r3.json();
    const wikitext = d3.parse?.wikitext?.['*'] || '';
    let captionMap = {};
    [...wikitext.matchAll(/<gallery[^>]*>([\s\S]*?)<\/gallery>/gi)].forEach(m => {
      m[1].split('\n').forEach(line => {
        const t = line.trim(), p = t.indexOf('|');
        if (p === -1) return;
        const fname = t.substring(0, p).trim(), cap = t.substring(p + 1).trim();
        if (fname && cap) captionMap[fname] = cap;
      });
    });

    // Set auto-filter keyword from team config
    const knownTeam = KNOWN_TEAMS.find(t => t.id === teamId);
    const autoKeywords = (knownTeam?.keywords || [teamId]).join(' ');
    document.getElementById('filter-kw').value = autoKeywords;

    // Step 4: render all cards
    let rendered = 0;
    images.forEach(imgName => {
      const url = urlMap[imgName]
        || urlMap[imgName.replace(/ /g,'_')]
        || urlMap[imgName.replace(/_/g,' ')]
        || Object.entries(urlMap).find(([k]) => k.toLowerCase() === imgName.toLowerCase())?.[1];

      const caption = captionMap[imgName] || captionMap[imgName.replace(/_/g,' ')] || '';

      let fromYear = '', toYear = '';
      const m = caption.match(/(\d{4})[–\-–](\d{4}|present)/i);
      const s = caption.match(/^(\d{4})$/);
      if (m) { fromYear = m[1]; toYear = m[2]==='present'?'2025':m[2]; }
      else if (s) { fromYear = s[1]; toYear = s[1]; }
      if (!fromYear) { const fm = imgName.match(/(\d{4})/); if (fm) fromYear = fm[1]; }

      const card = document.createElement('div');
      card.className = 'logo-card';
      card.dataset.filename = imgName.toLowerCase();
      card.dataset.url = url || '';
      card.onclick = e => { if (!e.target.matches('input')) toggleCard(card); };

      const shortName = imgName.replace(/_/g,' ').replace(/\.[^.]+$/,'');
      card.innerHTML = `
        <div class="logo-img-wrap">
          ${url
            ? `<img src="${url}" referrerpolicy="no-referrer" alt="${shortName}"
                    onerror="this.closest('.logo-img-wrap').innerHTML='<div class=\\'img-err\\'>❌</div>'">`
            : `<div class="img-err">keine URL</div>`}
        </div>
        <div class="logo-caption" title="${imgName}">${shortName.substring(0,26)}</div>
        <div class="logo-caption years-cap">${caption||'(kein Caption)'}</div>
        <div class="logo-years">
          <input type="number" class="from-input" value="${fromYear}" placeholder="von" min="1950" max="2030"
                 onclick="event.stopPropagation()" oninput="event.stopPropagation();updateOutput()">
          <span>–</span>
          <input type="number" class="to-input" value="${toYear}" placeholder="bis" min="1950" max="2030"
                 onclick="event.stopPropagation()" oninput="event.stopPropagation();updateOutput()">
        </div>
        <button class="use-btn" onclick="event.stopPropagation();toggleCard(this.closest('.logo-card'))">☐ Verwenden</button>`;

      gallery.appendChild(card);
      rendered++;
    });

    status.className = 'ok';
    status.textContent = `✅ ${rendered} Logos geladen. Filter aktiv:`;
    document.getElementById('filter-bar').style.display = 'block';
    applyFilter();

  } catch(e) {
    // Auto-fallback: try altPages if defined
    const knownTeam2 = KNOWN_TEAMS.find(t => t.id === teamId);
    const alts = knownTeam2?.altPages || [];
    const currentPage = document.getElementById('search-input').value.trim();
    const triedAlts = window._triedAlts = window._triedAlts || {};
    triedAlts[teamId] = triedAlts[teamId] || [];

    const nextAlt = alts.find(a => a !== currentPage && !triedAlts[teamId].includes(a));
    if (nextAlt) {
      triedAlts[teamId].push(currentPage);
      status.className = 'warn';
      status.textContent = `⚠️ "${currentPage}" nicht gefunden → versuche "${nextAlt}"…`;
      document.getElementById('search-input').value = nextAlt;
      btn.disabled = false;
      fetchPage();
      return;
    }
    // All alts exhausted → show search suggestions
    status.className = 'err';
    status.textContent = '❌ ' + e.message + ' — Seitenname prüfen oder Suche nutzen';
    const chip = document.getElementById('chip-' + teamId);
    if (chip) chip.className = 'team-chip err';
    window._triedAlts = {};
    // Auto-trigger search
    const searchQ = knownTeam2 ? knownTeam2.keywords[0] : teamId;
    document.getElementById('search-input').value = searchQ;
    doSearch();
  } finally {
    btn.disabled = false;
  }
}

function applyFilter() {
  const raw = document.getElementById('filter-kw').value.trim().toLowerCase();
  const terms = raw ? raw.split(/\s+/).filter(Boolean) : [];
  const cards = document.querySelectorAll('.logo-card');
  let visible = 0, hidden = 0;

  cards.forEach(card => {
    const fn = card.dataset.filename || '';
    const show = terms.length === 0 || terms.some(t => fn.includes(t));
    card.classList.toggle('filtered-out', !show);
    show ? visible++ : hidden++;
  });

  document.getElementById('filter-count').textContent =
    `${visible} sichtbar, ${hidden} ausgeblendet`;
}

function toggleCard(card) {
  const active = !card.classList.contains('selected');
  card.classList.toggle('selected', active);
  const btn = card.querySelector('.use-btn');
  btn.classList.toggle('active', active);
  btn.textContent = active ? '☑ Verwenden' : '☐ Verwenden';
  updateOutput();
}

function updateOutput() {
  const teamId = document.getElementById('teamid-input').value.trim();
  const selected = [...document.querySelectorAll('.logo-card.selected')];
  if (!selected.length) { document.getElementById('output-wrap').style.display='none'; return; }
  const entries = selected.map(card => {
    const from = card.querySelector('.from-input').value;
    const to   = card.querySelector('.to-input').value;
    const url  = card.dataset.url;
    if (!from || !to || !url) return null;
    return `        { from: ${from}, to: ${to}, url: "${url}" }`;
  }).filter(Boolean);
  if (!entries.length) return;
  document.getElementById('output').textContent = `"${teamId}": [\n${entries.join(',\n')}\n    ],`;
  document.getElementById('output-wrap').style.display = 'block';
}

function copyOutput() {
  navigator.clipboard.writeText(document.getElementById('output').textContent);
  event.target.textContent='✅'; setTimeout(()=>event.target.textContent='Kopieren',1500);
}

function addToAll() {
  const teamId = document.getElementById('teamid-input').value.trim();
  const code = document.getElementById('output').textContent;
  if (!code) return;
  allEntries[teamId] = code;
  const chip = document.getElementById('chip-' + teamId);
  if (chip) chip.className = 'team-chip done';
  const full = `const TEAM_LOGOS = {\n    ${Object.values(allEntries).join(',\n    ')}\n};`;
  document.getElementById('all-output').textContent = full;
  document.getElementById('all-wrap').style.display = 'block';
}

function copyAll() {
  navigator.clipboard.writeText(document.getElementById('all-output').textContent);
  event.target.textContent='✅'; setTimeout(()=>event.target.textContent='Alles kopieren',1500);
}

function clearAll() {
  if (!confirm('Gesamtliste löschen?')) return;
  allEntries = {};
  document.getElementById('all-output').textContent = '';
  document.getElementById('all-wrap').style.display = 'none';
  document.querySelectorAll('.team-chip').forEach(c => c.className='team-chip');
}

// Auto-load McLaren
document.getElementById('search-input').value = 'McLaren_F1_Team';
